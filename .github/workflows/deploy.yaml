name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via bakery-agent
        uses: appleboy/ssh-action@v1
        with:
          host: "91.107.228.148"
          username: "bakery"
          key: ${{ secrets.BAKERY_SSH_KEY }}
          script: |
            bakery deploy sports.jevido.nl --repo https://github.com/jevido/sports.git --branch main